<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Home - Smart Payment Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Smart Payment Tracker</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-light btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg p-4 rounded-3">
                <h2 class="mb-3 text-center">
                    Welcome, <span sec:authentication="name">User</span> 👋
                </h2>

                <p class="text-center text-muted">You are logged in successfully.</p>

                <hr>

                <!-- Example Quick Links -->
                <div class="d-flex justify-content-around mt-4">
                    <a th:href="@{/web/transactions}" class="btn btn-outline-primary">💰 Transactions</a>
                    <a th:href="@{/reports}" class="btn btn-outline-success">📊 Reports</a>
                    <a th:href="@{/settings/budget}" class="btn btn-outline-info">⚙️ Settings</a>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

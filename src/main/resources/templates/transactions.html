<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Transactions</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">Smart Payment Tracker</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/web/transactions}">Transactions</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/reports}">Reports</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/settings}">Settings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger" th:href="@{/logout}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">


  <!-- Add Transaction Form -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h4 class="card-title mb-3">Add Transaction</h4>
      <form th:action="@{/web/transactions}" th:object="${transaction}" method="post" class="row g-3">
        <input type="hidden" th:field="*{id}" />

        <div class="col-md-6">
          <label class="form-label">Description</label>
          <input type="text" th:field="*{description}" class="form-control" placeholder="E.g. Lunch, Fees" required/>
        </div>

        <div class="col-md-6">
          <label class="form-label">Amount</label>
          <input type="number" step="0.01" th:field="*{amount}" class="form-control" placeholder="Enter amount" required/>
        </div>

        <div class="col-md-6">
          <label class="form-label">Type</label>
          <select th:field="*{type}" class="form-select" required>
            <option value="">-- Select --</option>
            <option value="INCOME">INCOME</option>
            <option value="EXPENSE">EXPENSE</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input type="text" th:field="*{category}" class="form-control" placeholder="E.g. Food, Travel, Bills" required/>
        </div>

        <div class="col-md-6">
          <label class="form-label">Date</label>
          <input type="date" th:field="*{date}" class="form-control" required/>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-success">
            <span th:text="${transaction.id} != null ? 'Update Transaction' : 'Save Transaction'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Transactions Table -->
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="card-title mb-3">My Transactions</h4>
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-primary">
          <tr>
            <th>ID</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="txn : ${transactions}">
            <td th:text="${txn.id}"></td>
            <td th:text="${txn.description}"></td>
            <td th:text="${txn.amount}"></td>
            <td>
              <span th:text="${txn.type}"
                    th:classappend="${txn.type == 'INCOME'} ? 'badge bg-success' : 'badge bg-danger'"></span>
            </td>
            <td th:text="${txn.category}"></td>
            <td th:text="${txn.date}"></td>
            <td>
              <div class="d-flex gap-2 justify-content-center">
                <!-- Edit -->
                <form th:action="@{'/web/transactions/edit/' + ${txn.id}}" method="get">
                  <button type="submit" class="btn btn-sm btn-primary">Edit</button>
                </form>

                <!-- Delete -->
                <form th:action="@{'/web/transactions/delete/' + ${txn.id}}" method="post">
                  <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
